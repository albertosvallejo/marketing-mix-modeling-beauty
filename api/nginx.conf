# ── api/nginx.conf ────────────────────────────────────────────────────────────
# Nginx config para el servicio dashboard del docker-compose.
# Sirve los archivos estáticos de dashboard/ en el puerto 80 y hace
# proxy transparente de /api/ → http://api:8000/ para evitar CORS.
#
# Con este proxy el dashboard funcional apunta a /api/* en lugar de
# http://localhost:8000/* y funciona correctamente dentro de Docker.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index html_pilot_functional.html;

    # ── Archivos estáticos del dashboard ──────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Proxy transparente a la API FastAPI ───────────────────────────────
    # El dashboard funcional hace fetch("/api/health"), fetch("/api/predict"), etc.
    # Nginx elimina el prefijo /api/ antes de reenviar a uvicorn.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
